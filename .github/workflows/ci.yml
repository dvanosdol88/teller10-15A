name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (if present)
        run: |
          set -e
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f dev-requirements.txt ]; then pip install -r dev-requirements.txt; fi

      - name: Basic verification
        run: |
          set -e
          # If pytest is available, run it; otherwise, do a quick syntax check
          if python -c 'import pytest' 2>/dev/null; then
            pytest -q || pytest -q -k ''
          else
            python - <<'PY'
import os, sys
ok = True
for root, _, files in os.walk('.'):
    for f in files:
        if f.endswith('.py'):
            p = os.path.join(root, f)
            try:
                compile(open(p, 'rb').read(), p, 'exec')
            except Exception as e:
                print(f'SyntaxError in {p}: {e}', file=sys.stderr)
                ok = False
print('Syntax check:', 'OK' if ok else 'FAIL')
sys.exit(0 if ok else 1)
PY
          fi
